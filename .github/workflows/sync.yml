name: Sync

# I aggregate my three submission repos into this one. Each platform keeps its own
# source repo as the write target (LeetHub pushes LeetCode, the official NeetCode
# GitHub Sync pushes NeetCode, my own scripts push Codeforces) and this workflow
# copies each source into its platform folder here, so the whole archive is
# browsable in one place. The source repos stay the systems of record.
on:
  schedule:
    - cron: "23 * * * *" # hourly safety net, off the top of the hour to dodge the cron rush
  repository_dispatch:
    types: [sync] # instant path: my mirror-ops Worker fires this when a source repo is pushed
  workflow_dispatch: # manual: the first run or a forced resync

permissions:
  contents: write

# Sync runs must not interleave. Every run re-clones all three sources at their
# current HEAD and syncs all three platform folders, so only the LAST run in a
# burst needs to finish - it captures the full current state. A new trigger
# therefore cancels the run in flight and restarts, collapsing a burst into a
# single sync. This coalesces tools that push several times per action (LeetHub
# commits solution, README, topic tags and stats as separate pushes) into one
# commit instead of a pile-up of runs racing on the push. Applies to all three
# sources uniformly, since the group is shared across the whole workflow.
concurrency:
  group: sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull the three source repos into their platform folders
        env:
          # Optional. While the source repos are public the clone below works
          # anonymously and this stays empty. To make the sources private, add a
          # fine-grained PAT with read-only Contents on the three repos as the
          # SOURCES_TOKEN secret and everything keeps working unchanged.
          SOURCES_TOKEN: ${{ secrets.SOURCES_TOKEN }}
        run: |
          set -euo pipefail

          declare -A SOURCES=(
            [codeforces]=codeforces-submissions
            [leetcode]=leetcode-submissions
            [neetcode]=neetcode-submissions
          )

          parts=()
          for folder in codeforces leetcode neetcode; do
            src="${SOURCES[$folder]}"
            clone="$RUNNER_TEMP/$src"
            git clone --quiet --depth 1 "https://${SOURCES_TOKEN:+x-access-token:${SOURCES_TOKEN}@}github.com/${{ github.repository_owner }}/$src.git" "$clone"

            # Copy the source working tree over the platform folder. --delete keeps
            # removals in sync. The source's .git and .github never come across, and
            # LICENSE stays out so this repo keeps exactly one licence at the root.
            rsync -a --delete \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='LICENSE' \
              "$clone/" "$folder/"

            # Force-add so this repo's root .gitignore can never hide a file the
            # source repo deliberately tracks (codeforces tracks bin/, for example).
            git add -Af "$folder"

            if ! git diff --cached --quiet -- "$folder"; then
              parts+=("$folder @ $(git -C "$clone" rev-parse --short HEAD)")
            fi
          done

          if git diff --cached --quiet; then
            echo "Nothing changed - already in sync."
            exit 0
          fi

          msg="$(printf '%s, ' "${parts[@]}")"
          # The solutions are mine, so sync commits carry my identity. I use my
          # GitHub noreply address: it attributes and counts exactly like my real
          # one, but code search finds no spammable email in this file.
          git config user.name "Isaac Adjei"
          git config user.email "190771985+zaccesss@users.noreply.github.com"
          git commit --quiet -m "sync: ${msg%, }"

          # Bursty repository_dispatch events can still let two sync runs race to
          # push. The concurrency group above cancels an in-flight run when a new
          # one starts, but cancellation is not instant: a run can push in the
          # brief window before its cancel lands, leaving the next run's commit
          # behind main and its push rejected as non-fast-forward. Rather than
          # fail, re-fetch and rebase this sync commit onto the new remote tip and
          # retry. Sync commits are auto-generated and each source maps to its own
          # platform folder, so the rebase applies cleanly.
          for attempt in 1 2 3 4 5; do
            if git push --quiet; then
              echo "Committed: sync: ${msg%, }"
              exit 0
            fi
            echo "Push rejected (attempt $attempt) - rebasing on remote main and retrying."
            git pull --rebase --quiet origin main
          done

          echo "Push still failing after 5 attempts - giving up." >&2
          exit 1
